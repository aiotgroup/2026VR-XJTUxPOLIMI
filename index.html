<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 VR课程大作业汇总展示</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 50px; }
        
        /* 师资团队部分 */
        .team-section { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-bottom: 60px; }
        .member-card { text-align: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; }
        .member-card img { width: 150px; height: 180px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; background-color: #ddd; }
        .role { color: #7f8c8d; font-size: 0.9em; }

        /* 作品列表部分 */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .project-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .project-card:hover { transform: translateY(-5px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .project-info { padding: 20px; }
        .project-title { font-size: 1.25em; font-weight: bold; margin-bottom: 10px; color: #2980b9; }
        .author { color: #e67e22; font-weight: 500; margin-bottom: 10px; }
        .description { font-size: 0.95em; color: #666; text-align: justify; }
    </style>
</head>
<body>

    <h1>2026年春季，西安交通大学-米兰理工学院<br>虚拟现实课程 大作业汇总展示</h1>

    <div class="team-section">
        <div class="member-card">
            <img src="teacher_photo.jpg" alt="老师照片">
            <div class="role">授课教师</div>
            <div class="name">老师姓名</div>
        </div>
        <div class="member-card">
            <img src="ta_photo.jpg" alt="助教照片">
            <div class="role">助教</div>
            <div class="name">助教姓名</div>
        </div>
    </div>

    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 50px;">

    <div class="projects-grid">
        
        <div class="project-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID_HERE" allowfullscreen></iframe>
            </div>
            <div class="project-info">
                <div class="project-title">01. 作品名称示例</div>
                <div class="author">作者：学生姓名</div>
                <div class="description">
                    这是作品的简短介绍。描述该 VR 项目的核心创意、使用的技术栈（如 Unity/Unreal）以及在 XJTU-POLOMI 课程中的收获。
                </div>
            </div>
        </div>

        </div>

    <footer style="text-align: center; margin-top: 80px; padding: 20px; color: #95a5a6;">
        © 2026 XJTU-POLOMI VR Course | Designed by AIoT Group
    </footer>

</body>
</html>
