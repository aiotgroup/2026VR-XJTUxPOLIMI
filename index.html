<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 VR课程大作业汇总展示</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --pink-tag: #ff85a2; /* 粉色 */
            --blue-tag: #3498db; /* 蓝色 */
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: var(--bg-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        /* --- 教师与助教区域 (缩小版) --- */
        .staff-section {
            margin-bottom: 50px;
        }

        .teacher-row {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .ta-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap; /* 自动处理3个或更多助教并排 */
        }

        .staff-card {
            background: var(--card-bg);
            width: 150px; 
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        .staff-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
            background: #f0f0f0;
        }

        .role-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-bottom: 6px;
            color: white;
            font-weight: bold;
        }

        /* 标签颜色控制 */
        .tag-teacher { background-color: #e74c3c; }
        .tag-pink { background-color: var(--pink-tag); }
        .tag-blue { background-color: var(--blue-tag); }

        .name {
            font-weight: bold;
            font-size: 0.82rem; /* 稍微缩小以适应长名字 */
            color: var(--primary-color);
            white-space: nowrap; 
            letter-spacing: -0.3px;
        }

        /* --- 学生作品网格 --- */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .project-card:hover { transform: translateY(-8px); }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .project-info {
            padding: 20px;
            flex-grow: 1;
        }

        .project-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 12px;
        }

        .author-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .author-box {
            background: #f8f9fa;
            font-size: 0.8rem;
            padding: 4px 6px;
            border-radius: 4px;
            color: #666;
            text-align: center;
            border-left: 2px solid #ddd;
        }

        .project-desc {
            font-size: 0.85rem;
            color: #777;
            text-align: justify;
            line-height: 1.5;
            border-top: 1px solid #f0f0f0;
            padding-top: 12px;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px 0;
            color: #999;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
        }

        @media (max-width: 480px) {
            .staff-card { width: 135px; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>2026年春季，西安交通大学-米兰理工学院<br>虚拟现实课程 大作业汇总展示</h1>

    <div class="staff-section">
        <div class="teacher-row">
            <div class="card staff-card">
                <img src="images/wf2.jpg" alt="授课老师">
                <span class="role-tag tag-teacher">授课教师（Instructor）</span>
                <div class="name">王飞 （Fei Wang）</div>
            </div>
        </div>

        <div class="ta-row">
            <div class="card staff-card">
                <img src="images/zhangtt.png" alt="助教1">
                <span class="role-tag tag-ta">助教 (TA)</span>
                <div class="name">张婷婷（Tingting Zhang）</div>
            </div>
            <div class="card staff-card">
                <img src="images/lyn.jpg" alt="助教2">
                <span class="role-tag tag-ta">助教 (TA)</span>
                <div class="name">李怡诺（Yinuo Li）</div>
            </div>
            <div class="card staff-card">
                <img src="images/yaningli.jpg" alt="助教3">
                <span class="role-tag tag-ta">助教 (TA)</span>
                <div class="name">李亚宁（Yaning Li）</div>
            </div>
        </div>
    </div>

    <div class="projects-grid">
        
        <div class="card project-card">

        <iframe width="560" height="315" src="https://www.youtube.com/embed/LL3yonBuQK0?si=JmUBvT-MR0CodD7N" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                
            </div>

            
            <div class="project-content">
                <div class="project-title">01. 作品名称示例</div>
                <div class="author">作者：学生姓名</div>
                <div class="description">
                    这是作品的简短介绍。描述该 VR 项目的核心创意、使用的技术栈（如 Unity/Unreal）以及在 XJTU-POLOMI 课程中的收获。
                </div>
            </div>
        </div>
        </div>

    <footer>
        <p>© 2026 XJTU-POLOMI VR Joint Course | Powered by AIoT Group</p>
    </footer>

</body>
</html>
